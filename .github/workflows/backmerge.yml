name: Back-merge Reusable

# Back-merge automático disparado por PR mergeado a master.
# FAN-OUT: baja los cambios de master a CADA rama destino de forma independiente
# (master→develop y master→test). Cada destino se mergea desde master por separado,
# así un conflicto en una rama no bloquea a la otra. Las ramas que no existan se saltan.
#
# Robustez: concurrency con cola (no se pisan dos back-merge), push con reintento
# ante non-fast-forward, y rerere para reaplicar resoluciones de conflicto repetidas.
#
# Compatibilidad: los callers existentes pasan solo `target_branch: develop`; el input
# `extra_branches` (default 'test') agrega el segundo destino sin tocar los callers.

on:
  workflow_call:
    inputs:
      target_branch:
        description: 'Branch destino principal del backmerge'
        type: string
        default: 'develop'
      extra_branches:
        description: 'Ramas destino adicionales (separadas por espacio), se saltan si no existen'
        type: string
        default: 'test'
      validate_syntax:
        description: 'Validar sintaxis antes de push'
        type: boolean
        default: true
      syntax_pattern:
        description: 'Patrón de archivos a validar (ej: *.js, *.ts)'
        type: string
        default: '*.js'
      src_path:
        description: 'Directorio donde buscar archivos'
        type: string
        default: 'src'
      pr_number:
        description: 'Número del PR que disparó el backmerge'
        type: string
        required: true
      pr_title:
        description: 'Título del PR'
        type: string
        required: true
      pr_branch:
        description: 'Branch del PR'
        type: string
        required: true
      pr_url:
        description: 'URL del PR'
        type: string
        required: true
    secrets:
      repo_token:
        required: true
      slack_webhook_url:
        required: false

jobs:
  backmerge:
    runs-on: ubuntu-latest

    # Cola por repo: si se mergean 2 PRs a master casi seguidos, el segundo back-merge
    # ESPERA al primero en vez de correr en paralelo y pisarlo (push rechazado por
    # non-fast-forward → "a veces hay que hacerlo manual").
    # cancel-in-progress: false → encolar, NUNCA cancelar (no perder un back-merge).
    concurrency:
      group: backmerge-${{ github.repository }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.repo_token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # rerere: recordar la resolución de un conflicto para reaplicarla sola si reaparece.
          git config rerere.enabled true

      - name: Back-merge master to target branches (fan-out)
        id: backmerge
        env:
          GITHUB_TOKEN: ${{ secrets.repo_token }}
          PR_BRANCH: ${{ inputs.pr_branch }}
          PR_NUMBER: ${{ inputs.pr_number }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          EXTRA_BRANCHES: ${{ inputs.extra_branches }}
          VALIDATE_SYNTAX: ${{ inputs.validate_syntax }}
          SYNTAX_PATTERN: ${{ inputs.syntax_pattern }}
          SRC_PATH: ${{ inputs.src_path }}
        run: |
          set -uo pipefail
          git fetch origin --prune

          UPDATED=""        # ramas pusheadas con éxito
          PRS=""            # "rama:url" de PRs creados para resolución manual
          ANY_PR=false
          ANY_FAIL=false

          # ── Sintaxis sobre el árbol actual ───────────────────────────────
          check_syntax() {
            [ "$VALIDATE_SYNTAX" = "true" ] || return 0
            local bad=false
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              if ! node --check "$f" 2>/dev/null; then
                echo "Error de sintaxis en: $f"; node --check "$f" 2>&1 || true; bad=true
              fi
            done < <(find "$SRC_PATH" -name "$SYNTAX_PATTERN" -type f 2>/dev/null)
            [ "$bad" = false ]
          }

          # ── Back-merge de master a UNA rama ──────────────────────────────
          backmerge_one() {
            local TB="$1"

            if ! git rev-parse --verify -q "origin/${TB}" >/dev/null; then
              echo "ℹ️ rama '${TB}' no existe; se salta."
              return 0
            fi

            git checkout -B "$TB" "origin/${TB}"
            git pull origin "$TB" --no-edit || true

            # Idempotente: si ${TB} ya contiene master, nada que bajar.
            if git merge-base --is-ancestor "origin/master" "HEAD"; then
              echo "✅ ${TB} ya contiene master; sin cambios."
              return 0
            fi

            echo "🔀 Back-merge master → ${TB}"
            if ! git merge origin/master --no-ff -m "chore: auto back-merge ${PR_BRANCH} from master to ${TB}"; then
              echo "::warning::Conflictos en ${TB}; creando PR para resolución manual."
              git merge --abort
              local TMP="backmerge/${PR_BRANCH}-to-${TB}"
              git checkout -B "$TMP"
              git merge origin/master --no-ff --no-commit || true
              git add -A
              git commit -m "chore: back-merge ${PR_BRANCH} from master to ${TB} (con conflictos)"
              git push -u origin "$TMP" --force-with-lease
              local URL
              URL=$(gh pr create --base "$TB" --head "$TMP" \
                --title "Back-merge: ${PR_BRANCH} → ${TB} (conflictos)" \
                --body "Back-merge automático master→${TB} con conflictos. Resolver manualmente. PR origen #${PR_NUMBER} (${PR_BRANCH})." 2>/dev/null)
              PRS="${PRS}${TB}: ${URL}\n"; ANY_PR=true
              return 0
            fi

            if ! check_syntax; then
              echo "::warning::Errores de sintaxis en ${TB}; creando PR."
              local TMP="backmerge/${PR_BRANCH}-to-${TB}-syntax"
              git checkout -B "$TMP"
              git push -u origin "$TMP" --force-with-lease
              local URL
              URL=$(gh pr create --base "$TB" --head "$TMP" \
                --title "Back-merge: ${PR_BRANCH} → ${TB} (sintaxis)" \
                --body "Back-merge automático master→${TB} mergeó limpio pero node --check falló. Revisar. PR origen #${PR_NUMBER}." 2>/dev/null)
              PRS="${PRS}${TB}: ${URL}\n"; ANY_PR=true
              return 0
            fi

            # Push con reintento ante non-fast-forward.
            local MAX=5 attempt=0
            until [ "$attempt" -ge "$MAX" ]; do
              if git push origin "$TB"; then
                echo "✅ ${TB} actualizada."; UPDATED="${UPDATED}${TB} "; return 0
              fi
              attempt=$((attempt + 1))
              echo "push a ${TB} rechazado (intento ${attempt}/${MAX}); re-incorporando remoto..."
              git fetch origin "$TB"
              if ! git merge "origin/${TB}" --no-edit; then
                echo "::error::Conflicto al re-incorporar ${TB} en el reintento."
                git merge --abort || true; ANY_FAIL=true; return 1
              fi
            done
            echo "::error::No se pudo pushear a ${TB} tras ${MAX} intentos."; ANY_FAIL=true; return 1
          }

          # ── Lista de destinos: principal + extras, deduplicada ───────────
          SEEN=""
          for TB in $TARGET_BRANCH $EXTRA_BRANCHES; do
            case " $SEEN " in *" $TB "*) continue;; esac
            SEEN="$SEEN $TB"
            backmerge_one "$TB" || true
          done

          # ── Resultado agregado ───────────────────────────────────────────
          {
            echo "updated=${UPDATED}"
            echo "prs<<EOF"; printf '%b' "$PRS"; echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$ANY_FAIL" = true ]; then
            echo "result=failed" >> "$GITHUB_OUTPUT"; exit 1
          elif [ "$ANY_PR" = true ]; then
            echo "result=needs_review" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack on Success
        if: steps.backmerge.outputs.result == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_URL: ${{ inputs.pr_url }}
          PR_NUMBER: ${{ inputs.pr_number }}
          UPDATED: ${{ steps.backmerge.outputs.updated }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            BR="${UPDATED:-ninguna (ya estaban al día)}"
            curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
              -d "{\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"✅ *Back-merge completado*\n*Repo:* ${{ github.repository }}\n*PR origen:* <${PR_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n*Ramas sincronizadas con master:* ${BR}\n*Actor:* ${{ github.actor }}\"}}]}"
          fi

      - name: Notify Slack on Needs Review
        if: steps.backmerge.outputs.result == 'needs_review'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_URL: ${{ inputs.pr_url }}
          PR_NUMBER: ${{ inputs.pr_number }}
          UPDATED: ${{ steps.backmerge.outputs.updated }}
          PRS: ${{ steps.backmerge.outputs.prs }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
              -d "{\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"⚠️ *Back-merge requiere revisión manual*\n*Repo:* ${{ github.repository }}\n*PR origen:* <${PR_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n*Sincronizadas OK:* ${UPDATED:-ninguna}\n*PRs a resolver:*\n${PRS}\n*Actor:* ${{ github.actor }}\"}}]}"
          fi

      - name: Notify Slack on Failure
        if: failure() || steps.backmerge.outputs.result == 'failed'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_URL: ${{ inputs.pr_url }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
              -d "{\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"❌ *Back-merge falló — merge manual requerido*\n*Repo:* ${{ github.repository }}\n*PR origen:* <${PR_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n*Logs:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|ver detalles>\n*Actor:* ${{ github.actor }}\"}}]}"
          fi
