name: Heroku Deploy (Reusable)

# Deploy reusable para backends Node.js a Heroku (git push vía HEROKU_API_KEY).
# Un caller de ~18 líneas por repo (ver ejemplo abajo). La lógica vive una sola vez.
#
# Modelo de ramas (igual que firebase-deploy.yml):
#   push a `test`   -> deploy a la app de test  (app_test)
#   push a `master` -> deploy a la app de prod  (app_prod)
#
# Config/secrets del runtime (ESTÁNDAR, opcional): si se pasa `secret_test`/`secret_prod`,
# el workflow lee `central-secrets/<secret>` (fuente de verdad = repo de secretos) y aplica
# los valores como *config vars* de la app Heroku antes del deploy. Solo setea valores NO
# vacíos (los placeholders no pisan config existente). Requiere `gcp_sa_test`/`gcp_sa_prod`
# (key de una SA con secretAccessor sobre ese secreto).
#
# Ejemplo de caller (.github/workflows/deploy.yml):
#   name: Deploy ganaya-backend
#   on: { push: { branches: [master, test] }, workflow_dispatch: {} }
#   jobs:
#     deploy:
#       uses: CPEL-SAC/workflow-mgmt/.github/workflows/heroku-deploy.yml@main
#       with:
#         app_prod: ganaya
#         app_test: ganaya-test
#         secret_prod: ganaya-backend-prod   # central-secrets/<...>
#         secret_test: ganaya-backend-dev
#       secrets:
#         heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
#         heroku_email: ${{ secrets.HEROKU_EMAIL }}
#         gcp_sa_prod: ${{ secrets.GCP_SA_PROD }}
#         gcp_sa_test: ${{ secrets.GCP_SA_TEST }}
#         slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

on:
  workflow_call:
    inputs:
      app_prod:
        description: 'Nombre de la app Heroku de prod'
        required: true
        type: string
      app_test:
        description: 'Nombre de la app Heroku de test'
        required: true
        type: string
      secret_prod:
        description: 'central-secrets/<secret> con las config vars de prod (opcional). Vacío = no sincronizar config.'
        required: false
        type: string
        default: ''
      secret_test:
        description: 'central-secrets/<secret> con las config vars de test (opcional).'
        required: false
        type: string
        default: ''
    secrets:
      heroku_api_key:
        required: true
      heroku_email:
        required: true
      gcp_sa_prod:
        required: false
      gcp_sa_test:
        required: false
      slack_webhook_url:
        required: false

jobs:
  deploy-test:
    name: Deploy → ${{ inputs.app_test }} (test)
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Config vars desde central-secrets (opcional) ──
      - name: Authenticate with GCP (test)
        if: inputs.secret_test != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.gcp_sa_test }}
      - name: Pull config from Secret Manager (test)
        id: sec
        if: inputs.secret_test != ''
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            env_json:central-secrets/${{ inputs.secret_test }}
      - name: Sync Heroku config vars (test)
        if: inputs.secret_test != ''
        env:
          HEROKU_API_KEY: ${{ secrets.heroku_api_key }}
          APP: ${{ inputs.app_test }}
          ENV_JSON: ${{ steps.sec.outputs.env_json }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          d = json.loads(os.environ["ENV_JSON"])
          payload = {k: v for k, v in d.items() if v not in ("", None)}
          if not payload:
              print("Sin valores (placeholders vacíos); no se tocan las config vars.")
              raise SystemExit(0)
          req = urllib.request.Request(
              f"https://api.heroku.com/apps/{os.environ['APP']}/config-vars",
              data=json.dumps(payload).encode(), method="PATCH",
              headers={"Authorization": f"Bearer {os.environ['HEROKU_API_KEY']}",
                       "Accept": "application/vnd.heroku+json; version=3",
                       "Content-Type": "application/json"})
          urllib.request.urlopen(req)
          print(f"Config vars aplicadas a {os.environ['APP']}: {len(payload)}")
          PY

      # ── Deploy (git push a Heroku, sin CLI) ──
      - name: Deploy to Heroku (test)
        env:
          HEROKU_API_KEY: ${{ secrets.heroku_api_key }}
          APP: ${{ inputs.app_test }}
        run: |
          git push -f "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${APP}.git" HEAD:refs/heads/main

      - name: Notify Slack on Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
              -d "{\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"❌ *Heroku deploy TEST falló* — ${{ github.repository }} → ${{ inputs.app_test }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|logs>\"}}]}"
          fi

  deploy-prod:
    name: Deploy → ${{ inputs.app_prod }} (prod)
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Config vars desde central-secrets (opcional) ──
      - name: Authenticate with GCP (prod)
        if: inputs.secret_prod != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.gcp_sa_prod }}
      - name: Pull config from Secret Manager (prod)
        id: sec
        if: inputs.secret_prod != ''
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            env_json:central-secrets/${{ inputs.secret_prod }}
      - name: Sync Heroku config vars (prod)
        if: inputs.secret_prod != ''
        env:
          HEROKU_API_KEY: ${{ secrets.heroku_api_key }}
          APP: ${{ inputs.app_prod }}
          ENV_JSON: ${{ steps.sec.outputs.env_json }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          d = json.loads(os.environ["ENV_JSON"])
          payload = {k: v for k, v in d.items() if v not in ("", None)}
          if not payload:
              print("Sin valores (placeholders vacíos); no se tocan las config vars.")
              raise SystemExit(0)
          req = urllib.request.Request(
              f"https://api.heroku.com/apps/{os.environ['APP']}/config-vars",
              data=json.dumps(payload).encode(), method="PATCH",
              headers={"Authorization": f"Bearer {os.environ['HEROKU_API_KEY']}",
                       "Accept": "application/vnd.heroku+json; version=3",
                       "Content-Type": "application/json"})
          urllib.request.urlopen(req)
          print(f"Config vars aplicadas a {os.environ['APP']}: {len(payload)}")
          PY

      # ── Deploy (git push a Heroku, sin CLI) ──
      - name: Deploy to Heroku (prod)
        env:
          HEROKU_API_KEY: ${{ secrets.heroku_api_key }}
          APP: ${{ inputs.app_prod }}
        run: |
          git push -f "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${APP}.git" HEAD:refs/heads/main

      - name: Notify Slack on Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
              -d "{\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"❌ *Heroku deploy PROD falló* — ${{ github.repository }} → ${{ inputs.app_prod }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|logs>\"}}]}"
          fi
