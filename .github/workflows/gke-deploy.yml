name: Deploy to GKE (GitOps)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      project_id:
        required: true
        type: string
      region:
        required: false
        type: string
        default: 'us-central1'
      gke_cluster:
        required: true
        type: string
      gke_zone:
        required: false
        type: string
        default: 'us-central1'
      sync_deployment:
        required: false
        type: boolean
        default: false
      argocd_server:
        required: false
        type: string
        default: 'argo.thecosmosproject.com'
    secrets:
      gcp_credentials:
        required: true
      manifests_pat:
        required: true
      slack_webhook_url:
        required: false
      argocd_token:
        required: false

env:
  MANIFESTS_REPO: CPEL-SAC/manifiestos-kubernetes

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      full_image: ${{ steps.meta.outputs.full_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.gcp_credentials }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          VERSION="${SHORT_SHA}-${TIMESTAMP}"
          FULL_IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.service_name }}/${{ inputs.service_name }}:${VERSION}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "📦 Image: ${FULL_IMAGE}"

      - name: Build Docker image
        run: |
          docker build \
            --file dockerfile \
            --tag ${{ steps.meta.outputs.full_image }} \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.full_image }}

          docker tag ${{ steps.meta.outputs.full_image }} \
            ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.service_name }}/${{ inputs.service_name }}:latest
          docker push ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.service_name }}/${{ inputs.service_name }}:latest

          echo "✅ Image pushed successfully"

  update-manifests:
    name: Update Manifests (GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout manifests repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          token: ${{ secrets.manifests_pat }}
          path: manifests

      - name: Update image tag in deployments
        working-directory: manifests/${{ inputs.project_id }}/${{ inputs.service_name }}/k8s
        run: |
          NEW_IMAGE="${{ needs.build-and-push.outputs.full_image }}"

          echo "🔄 Updating image to: ${NEW_IMAGE}"

          PATTERN="image: ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.service_name }}/${{ inputs.service_name }}:.*"

          sed -i "s|${PATTERN}|image: ${NEW_IMAGE}|g" deployment.yaml
          echo "📄 Updated deployment.yaml:"
          grep "image:" deployment.yaml

          if [ "${{ inputs.sync_deployment }}" = "true" ]; then
            sed -i "s|${PATTERN}|image: ${NEW_IMAGE}|g" deployment-sync.yaml
            echo "📄 Updated deployment-sync.yaml:"
            grep "image:" deployment-sync.yaml
          fi

          if [ -f "deployment-job.yaml" ]; then
            sed -i "s|${PATTERN}|image: ${NEW_IMAGE}|g" deployment-job.yaml
            echo "📄 Updated deployment-job.yaml:"
            grep "image:" deployment-job.yaml
          fi

      - name: Commit and push manifest changes
        working-directory: manifests
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add .

          if git diff --staged --quiet; then
            echo "⚠️ No changes to commit"
            exit 0
          fi

          git commit -m "chore(${{ inputs.service_name }}): update image to ${{ needs.build-and-push.outputs.image_tag }}

          Source commit: ${{ github.sha }}
          Triggered by: ${{ github.actor }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          git push origin main

          echo "✅ Manifests repository updated"

  deploy-to-gke:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [build-and-push, update-manifests]

    steps:
      - name: Check ArgoCD app exists
        id: argocd_check
        env:
          ARGOCD_TOKEN: ${{ secrets.argocd_token }}
          ARGOCD_SERVER: ${{ inputs.argocd_server }}
        run: |
          # Si no hay token → fallback kubectl
          if [ -z "$ARGOCD_TOKEN" ]; then
            echo "use_argocd=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No ArgoCD token → using kubectl fallback"
            exit 0
          fi

          # Instalar ArgoCD CLI
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

          # Verificar si existe la app {service_name}-prod
          ARGOCD_APP="${{ inputs.service_name }}-prod"
          echo "🔍 Checking ArgoCD app: ${ARGOCD_APP}"

          if argocd app get "${ARGOCD_APP}" \
              --server "${ARGOCD_SERVER}" \
              --auth-token "${ARGOCD_TOKEN}" \
              --grpc-web \
              --plaintext=false 2>/dev/null; then
            echo "use_argocd=true" >> $GITHUB_OUTPUT
            echo "argocd_app=${ARGOCD_APP}" >> $GITHUB_OUTPUT
            echo "✅ ArgoCD app found → using ArgoCD sync"
          else
            echo "use_argocd=false" >> $GITHUB_OUTPUT
            echo "ℹ️ ArgoCD app not found → using kubectl fallback"
          fi

      # ─── RUTA ARGOCD ───────────────────────────────────────────────
      - name: Sync via ArgoCD
        if: steps.argocd_check.outputs.use_argocd == 'true'
        env:
          ARGOCD_TOKEN: ${{ secrets.argocd_token }}
          ARGOCD_SERVER: ${{ inputs.argocd_server }}
        run: |
          ARGOCD_APP="${{ steps.argocd_check.outputs.argocd_app }}"
          echo "🚀 Syncing ArgoCD app: ${ARGOCD_APP}"

          argocd app sync "${ARGOCD_APP}" \
            --server "${ARGOCD_SERVER}" \
            --auth-token "${ARGOCD_TOKEN}" \
            --grpc-web \
            --force \
            --timeout 30

          echo "⏳ Waiting for app to be Healthy..."
          argocd app wait "${ARGOCD_APP}" \
            --server "${ARGOCD_SERVER}" \
            --auth-token "${ARGOCD_TOKEN}" \
            --grpc-web \
            --health \
            --timeout 900

          echo "✅ ArgoCD sync completed"

      - name: Summary (ArgoCD)
        if: steps.argocd_check.outputs.use_argocd == 'true'
        run: |
          echo "## 🚀 GKE Deploy Summary (via ArgoCD)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ needs.build-and-push.outputs.full_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ArgoCD App** | ${{ steps.argocd_check.outputs.argocd_app }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **ArgoCD URL** | https://${{ inputs.argocd_server }}/applications/${{ steps.argocd_check.outputs.argocd_app }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Slack notification sent automatically by ArgoCD Notifications" >> $GITHUB_STEP_SUMMARY

      # ─── RUTA FALLBACK KUBECTL ─────────────────────────────────────
      - name: Authenticate to Google Cloud
        if: steps.argocd_check.outputs.use_argocd != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.gcp_credentials }}

      - name: Set up Cloud SDK
        if: steps.argocd_check.outputs.use_argocd != 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        if: steps.argocd_check.outputs.use_argocd != 'true'
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Configure kubectl
        if: steps.argocd_check.outputs.use_argocd != 'true'
        run: |
          gcloud container clusters get-credentials ${{ inputs.gke_cluster }} \
            --region ${{ inputs.gke_zone }} \
            --project ${{ inputs.project_id }}

      - name: Checkout manifests repository
        if: steps.argocd_check.outputs.use_argocd != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          token: ${{ secrets.manifests_pat }}
          ref: main
          path: manifests

      - name: Apply manifests to GKE
        if: steps.argocd_check.outputs.use_argocd != 'true'
        working-directory: manifests/${{ inputs.project_id }}/${{ inputs.service_name }}/k8s
        run: |
          echo "🚀 Applying manifests to GKE cluster..."

          NAMESPACE=$(grep "namespace:" deployment.yaml | head -1 | awk '{print $2}')
          echo "📍 Detected namespace: ${NAMESPACE}"

          if [ -z "$NAMESPACE" ]; then
            NAMESPACE="default"
            echo "⚠️ No namespace found, using default"
          fi

          DEPLOY_NAME=$(grep "^  name:" deployment.yaml | head -1 | awk '{print $2}')
          echo "📦 Deployment name: ${DEPLOY_NAME}"

          kubectl apply -f deployment.yaml
          echo "⏳ Waiting for rollout of ${DEPLOY_NAME}..."
          kubectl rollout status deployment/${DEPLOY_NAME} -n ${NAMESPACE} --timeout=300s

          if [ "${{ inputs.sync_deployment }}" = "true" ]; then
            SYNC_DEPLOY_NAME=$(grep "^  name:" deployment-sync.yaml | head -1 | awk '{print $2}')
            echo "📦 Sync deployment name: ${SYNC_DEPLOY_NAME}"
            kubectl apply -f deployment-sync.yaml
            echo "⏳ Waiting for rollout of ${SYNC_DEPLOY_NAME}..."
            kubectl rollout status deployment/${SYNC_DEPLOY_NAME} -n ${NAMESPACE} --timeout=300s
          fi

          if [ -f "deployment-job.yaml" ]; then
            kubectl apply -f deployment-job.yaml
            echo "⏳ Waiting for rollout of ${{ inputs.service_name }}-jobs..."
            kubectl rollout status deployment/${{ inputs.service_name }}-jobs -n ${NAMESPACE} --timeout=300s
          fi

          echo "✅ Deployment completed successfully"

      - name: Verify deployment
        if: steps.argocd_check.outputs.use_argocd != 'true'
        working-directory: manifests/${{ inputs.project_id }}/${{ inputs.service_name }}/k8s
        run: |
          NAMESPACE=$(grep "namespace:" deployment.yaml | head -1 | awk '{print $2}')
          if [ -z "$NAMESPACE" ]; then
            NAMESPACE="default"
          fi

          DEPLOY_NAME=$(grep "^  name:" deployment.yaml | head -1 | awk '{print $2}')

          echo "📋 Deployment status (${DEPLOY_NAME}):"
          kubectl get deployment ${DEPLOY_NAME} -n ${NAMESPACE} -o wide

          echo ""
          echo "📋 Pods status (${DEPLOY_NAME}):"
          kubectl get pods -n ${NAMESPACE} -l app=${DEPLOY_NAME} -o wide

          if [ "${{ inputs.sync_deployment }}" = "true" ]; then
            SYNC_DEPLOY_NAME=$(grep "^  name:" deployment-sync.yaml | head -1 | awk '{print $2}')
            echo ""
            echo "📋 Deployment status (${SYNC_DEPLOY_NAME}):"
            kubectl get deployment ${SYNC_DEPLOY_NAME} -n ${NAMESPACE} -o wide

            echo ""
            echo "📋 Pods status (${SYNC_DEPLOY_NAME}):"
            kubectl get pods -n ${NAMESPACE} -l app=${SYNC_DEPLOY_NAME} -o wide
          fi

          if [ -f "deployment-job.yaml" ]; then
            echo ""
            echo "📋 Deployment status (${{ inputs.service_name }}-jobs):"
            kubectl get deployment ${{ inputs.service_name }}-jobs -n ${NAMESPACE} -o wide

            echo ""
            echo "📋 Pods status (${{ inputs.service_name }}-jobs):"
            kubectl get pods -n ${NAMESPACE} -l app=${{ inputs.service_name }}-jobs -o wide
          fi

      - name: Summary (kubectl)
        if: steps.argocd_check.outputs.use_argocd != 'true'
        run: |
          echo "## 🚀 GKE Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ needs.build-and-push.outputs.full_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | ${{ inputs.gke_cluster }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Manifests Path** | ${{ inputs.project_id }}/${{ inputs.service_name }}/k8s |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack on Success
        if: steps.argocd_check.outputs.use_argocd != 'true' && success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d '{
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "✅ *GKE Deploy Exitoso*\n*Service:* ${{ inputs.service_name }}\n*Cluster:* ${{ inputs.gke_cluster }}\n*Project:* ${{ inputs.project_id }}\n*Image:* ${{ needs.build-and-push.outputs.image_tag }}\n*Actor:* ${{ github.actor }}"
                    }
                  }
                ]
              }'
          fi

      - name: Notify Slack on Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d '{
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "❌ *GKE Deploy Fallido*\n*Service:* ${{ inputs.service_name }}\n*Cluster:* ${{ inputs.gke_cluster }}\n*Project:* ${{ inputs.project_id }}\n*Actor:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Ver logs>"
                    }
                  }
                ]
              }'
          fi
